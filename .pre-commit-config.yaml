# Pre-commit hooks for the stockie_ai monorepo.
# Python hooks are scoped to backend/ via the `files:` filter.
# Run manually:  pre-commit run --all-files
# Install hooks: pre-commit install

repos:
  # ── General file hygiene ────────────────────────────────────────────────────
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-toml
      - id: check-added-large-files
      - id: debug-statements
        files: ^backend/

  # ── Ruff — linting + import sorting (backend Python only) ───────────────────
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.11.12
    hooks:
      - id: ruff
        args: [--fix]
        files: ^backend/

  # ── Black — formatting (backend Python only) ────────────────────────────────
  - repo: https://github.com/psf/black
    rev: 25.1.0
    hooks:
      - id: black
        language_version: python3.12
        files: ^backend/

  # ── Mypy — static type checking (backend Python only) ───────────────────────
  # Runs through uv so it sees the project's installed stubs and dependencies.
  - repo: local
    hooks:
      - id: mypy
        name: mypy (backend)
        entry: bash -c 'cd backend && ~/.local/bin/uv run mypy app tests'
        language: system
        types: [python]
        files: ^backend/
        pass_filenames: false
